ourData:
  reverse: false
  title: "Our data"
  description: |      # required
    Our data includes life histories of thousands of individual lemurs from our living colony; frozen and liquid-preserved specimens in our extensive BioBank; as well as osteological, fossil, and subfossil specimens at the Museum of Natural History. Together, these data tell the interconnected stories of lemurs and humans and provide for countless research opportunities.
  # img required
  background: /assets/images/headers/mouse_mega.jpg
  imageLicense: |
    The smallest lemur, a mouse lemur (_Microcebus murinus_), sits on the skull of the largest lemur, the extinct _Megaladapis_. Photo by David Haring
  href: /occurrence/search?publishingOrg=0dea2b07-16e2-4604-9f50-36a4dd81d0e0
  cta:
